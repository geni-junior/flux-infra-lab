apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 5m
  url: https://flux-iac.github.io/tofu-controller/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tofu-controller
  namespace: flux-system
spec:
  interval: 5m
  chart:
    spec:
      chart: tofu-controller
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: tofu-controller
